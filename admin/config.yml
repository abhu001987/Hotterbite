backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Posts"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"

    fields:

      - {label: "Title", name: "title", widget: "string"}

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - daily
          - economy
          - editorial
          - environment
          - governance
          - history
          - ir
          - sansad
          - schemes
          - science
          - social

      - {label: "Image", name: "image", widget: "image"}

      - {label: "Content", name: "body", widget: "markdown"}
